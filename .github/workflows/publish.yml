name: Publish to npm
# Direct publishing to npmjs from GitHub using pnpm and npm with OIDC Trusted Publishing
on:
  push:
    tags:
      # 通常リリース: 例) v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+"
      # プリリリースのみ: 例) v1.2.3-rc.1, v1.2.3-beta など(必ず '-' が付く)
      - "v[0-9]+.[0-9]+.[0-9]+-*"

defaults:
  run:
    shell: bash

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    if: github.repository_owner == github.actor
    ## Only run if pushed by repository owner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    permissions:
      actions: read # reusable workflow の実行に必要
      security-events: write # 脆弱性スキャン結果(SARIF形式)を  GitHub の Security タブにアップロードするために必要
      contents: read # リポジトリの内容を読み取るために必要
    with:
      scan-args: "-L ./pnpm-lock.yaml"

  publish:
    if: github.repository_owner == github.actor
    ## Only run if pushed by repository owner and after OSV scan passes...
    needs: osv-scan
    runs-on: ubuntu-latest
    environment: npmjs
    permissions:
      contents: read
      # contents: write # for releases
      id-token: write # OIDC に必須
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # ↑ https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/ 対応
      # 2026年6月2日より前に、pnpm/action-setup が Node24対応になったことを確認して
      # heiwa4126/reusable-workflows/build-pnpm-package-and-publish を更新してから、
      # この環境変数は削除すること
    steps:
      - name: Build and Publish
        uses: heiwa4126/reusable-workflows/build-pnpm-package-and-publish@d1af8e63af88cd9386f1e6174f748df97fca0647 # v0.0.13
        with:
          checkout: true
